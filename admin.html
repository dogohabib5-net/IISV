<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Administration — IISV</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    :root {
      --navy: #0b1f3a;
      --gold: #c9a646;
      --gold-soft: #e5c66c;
      --light: #f7f8fb;
      --text: #1c2430;
      --muted: #5f6978;
      --border: #e4e7ee;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Inter", sans-serif;
      background: var(--light);
      color: var(--text);
      min-height: 100vh;
    }

    /* Login */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(135deg, #08182e 0%, #0b1f3a 55%, #10294c 100%);
    }

    .login-card {
      background: #fff;
      border-radius: 18px;
      padding: 32px;
      width: min(100%, 380px);
      box-shadow: 0 12px 35px rgba(7, 19, 38, 0.25);
    }

    .login-card h1 {
      font-size: 1.3rem;
      color: var(--navy);
      margin-bottom: 6px;
    }

    .login-card p {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 20px;
    }

    .login-card input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      font: inherit;
      margin-bottom: 12px;
      outline: none;
    }

    .login-card input:focus {
      border-color: var(--gold);
    }

    .login-card button {
      width: 100%;
      border: none;
      background: linear-gradient(135deg, var(--gold), var(--gold-soft));
      color: #1d1707;
      font-weight: 700;
      padding: 13px;
      border-radius: 999px;
      cursor: pointer;
      font: inherit;
    }

    #login-error {
      color: #c0392b;
      font-size: 0.85rem;
      margin-top: 10px;
      display: none;
    }

    /* Admin layout */
    #admin-screen {
      display: none;
      min-height: 100vh;
      grid-template-columns: 320px 1fr;
    }

    #admin-screen.active {
      display: grid;
    }

    .sidebar {
      background: var(--navy);
      color: #fff;
      padding: 20px 0;
      overflow-y: auto;
      max-height: 100vh;
    }

    .sidebar-header {
      padding: 0 18px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 10px;
    }

    .sidebar-header strong {
      font-size: 1rem;
    }

    .sidebar-header button {
      background: transparent;
      border: none;
      color: #d8dbe3;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .client-item {
      padding: 14px 18px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .client-item:hover, .client-item.active {
      background: rgba(255,255,255,0.08);
    }

    .client-item strong {
      display: block;
      font-size: 0.95rem;
    }

    .client-item span {
      display: block;
      font-size: 0.8rem;
      color: #b9c2d4;
      margin-top: 2px;
    }

    .empty-list {
      padding: 18px;
      color: #b9c2d4;
      font-size: 0.9rem;
    }

    /* Chat panel */
    .chat-panel {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .chat-header {
      padding: 18px 24px;
      background: #fff;
      border-bottom: 1px solid var(--border);
    }

    .chat-header h2 {
      font-size: 1.1rem;
      color: var(--navy);
    }

    .chat-header p {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 4px;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 0.92rem;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .msg-client {
      align-self: flex-start;
      background: #fff;
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .msg-admin {
      align-self: flex-end;
      background: var(--navy);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .chat-input-row {
      display: flex;
      gap: 10px;
      padding: 16px 24px;
      background: #fff;
      border-top: 1px solid var(--border);
    }

    .chat-input-row input {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 12px 16px;
      font: inherit;
      outline: none;
    }

    .chat-input-row button {
      border: none;
      background: linear-gradient(135deg, var(--gold), var(--gold-soft));
      color: #1d1707;
      width: 46px;
      height: 46px;
      border-radius: 999px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .no-selection {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      padding: 24px;
      text-align: center;
    }

    .tab-btn {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: #d8dbe3;
      padding: 8px;
      border-radius: 10px;
      font: inherit;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .tab-btn.active {
      background: var(--gold);
      color: #1d1707;
      border-color: var(--gold);
      font-weight: 700;
    }

    .pub-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px 24px 0;
    }

    .pub-form input,
    .pub-form select,
    .pub-form textarea {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      font: inherit;
      outline: none;
    }

    .pub-form textarea {
      min-height: 90px;
      resize: vertical;
    }

    .pub-item {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    .pub-item h4 {
      color: var(--navy);
      font-size: 0.98rem;
      margin-bottom: 4px;
    }

    .pub-item p {
      color: var(--muted);
      font-size: 0.85rem;
    }

    .pub-item button {
      border: none;
      background: transparent;
      color: #c0392b;
      cursor: pointer;
      font-size: 0.9rem;
      flex-shrink: 0;
    }

    @media (max-width: 760px) {
      #admin-screen.active {
        grid-template-columns: 1fr;
      }
      .sidebar {
        max-height: 40vh;
      }
    }
  </style>
</head>
<body>

  <div id="login-screen">
    <div class="login-card">
      <h1><i class="fa-solid fa-shield-halved"></i>&nbsp; Administration IISV</h1>
      <p>Connectez-vous pour accéder aux cabinets privés de vos clients.</p>
      <form id="login-form">
        <input type="email" id="login-email" placeholder="E-mail" required autocomplete="username" />
        <input type="password" id="login-password" placeholder="Mot de passe" required autocomplete="current-password" />
        <button type="submit">Se connecter</button>
      </form>
      <p id="login-error"></p>
    </div>
  </div>

  <div id="admin-screen">
    <aside class="sidebar">
      <div class="sidebar-header">
        <strong><i class="fa-solid fa-user-shield"></i>&nbsp; <span id="sidebar-title">Cabinets</span></strong>
        <button id="logout-btn">Déconnexion</button>
      </div>
      <div style="display:flex; gap:8px; padding:0 18px 12px;">
        <button id="tab-cabinets" class="tab-btn active">Cabinets</button>
        <button id="tab-publications" class="tab-btn">Publications</button>
      </div>
      <div id="client-list">
        <p class="empty-list">Chargement…</p>
      </div>
    </aside>

    <section class="chat-panel" id="panel-cabinets">
      <div id="no-selection" class="no-selection">
        Sélectionnez un client à gauche pour voir et répondre à son cabinet.
      </div>
      <div id="chat-active" style="display:none; flex-direction:column; height:100%;">
        <div class="chat-header">
          <h2 id="chat-client-name"></h2>
          <p id="chat-client-meta"></p>
        </div>
        <div class="chat-messages" id="chat-messages"></div>
        <form class="chat-input-row" id="reply-form">
          <input type="text" id="reply-input" placeholder="Répondre…" autocomplete="off" />
          <button type="submit" aria-label="Envoyer"><i class="fa-solid fa-paper-plane"></i></button>
        </form>
      </div>
    </section>

    <section class="chat-panel" id="panel-publications" style="display:none; overflow-y:auto;">
      <div class="pub-form-wrap">
        <h2 style="padding:20px 24px 0; color:var(--navy);">Publier du nouveau contenu</h2>
        <form id="pub-form" class="pub-form">
          <input type="text" id="pub-title" placeholder="Titre" required />
          <select id="pub-type" required>
            <option value="article">Article (texte)</option>
            <option value="document">Document (lien de téléchargement)</option>
            <option value="audio">Audio (lien direct vers un fichier .mp3)</option>
            <option value="video">Vidéo (lien YouTube)</option>
          </select>
          <textarea id="pub-content" placeholder="Texte, description ou résumé" required></textarea>
          <input type="url" id="pub-url" placeholder="Lien (pour document, audio ou vidéo) — laisser vide pour un article" />
          <button type="submit" class="btn btn-primary" style="align-self:flex-start;">
            <i class="fa-solid fa-paper-plane"></i> Publier
          </button>
          <p id="pub-status" style="display:none; color:#1e7d43; font-size:0.9rem;"></p>
        </form>

        <h2 style="padding:28px 24px 0; color:var(--navy);">Publications existantes</h2>
        <div id="pub-list" style="padding:16px 24px 24px;"></div>
      </div>
    </section>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyD5ADGuZs98c5Fepo_4dpy4GSl-vpVt0Lk",
      authDomain: "iisv-bf703.firebaseapp.com",
      projectId: "iisv-bf703",
      storageBucket: "iisv-bf703.firebasestorage.app",
      messagingSenderId: "911168343842",
      appId: "1:911168343842:web:976d23f9247d379f189f7b"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const loginScreen = document.getElementById('login-screen');
    const adminScreen = document.getElementById('admin-screen');
    const loginForm = document.getElementById('login-form');
    const loginError = document.getElementById('login-error');
    const logoutBtn = document.getElementById('logout-btn');
    const clientListEl = document.getElementById('client-list');
    const noSelectionEl = document.getElementById('no-selection');
    const chatActiveEl = document.getElementById('chat-active');
    const chatMessagesEl = document.getElementById('chat-messages');
    const chatClientName = document.getElementById('chat-client-name');
    const chatClientMeta = document.getElementById('chat-client-meta');
    const replyForm = document.getElementById('reply-form');
    const replyInput = document.getElementById('reply-input');

    let currentClientId = null;
    let unsubscribeMessages = null;
    let unsubscribeClients = null;

    const sujetLabels = {
      accompagnement: 'Accompagnement personnel',
      formation: 'Formation intellectuelle',
      conference: 'Conférence / intervention',
      autre: 'Autre'
    };

    loginForm.addEventListener('submit', function (e) {
      e.preventDefault();
      loginError.style.display = 'none';
      auth
        .signInWithEmailAndPassword(
          document.getElementById('login-email').value,
          document.getElementById('login-password').value
        )
        .catch(function (err) {
          loginError.textContent = 'Connexion impossible : vérifiez l’e-mail et le mot de passe.';
          loginError.style.display = 'block';
        });
    });

    logoutBtn.addEventListener('click', function () {
      auth.signOut();
    });

    auth.onAuthStateChanged(function (user) {
      if (user) {
        loginScreen.style.display = 'none';
        adminScreen.classList.add('active');
        loadClients();
      } else {
        loginScreen.style.display = 'flex';
        adminScreen.classList.remove('active');
        if (unsubscribeClients) unsubscribeClients();
        if (unsubscribeMessages) unsubscribeMessages();
      }
    });

    function loadClients() {
      // On écoute toute la collection sans "orderBy" côté serveur : un tri par
      // date sur le serveur exclut silencieusement tout document dont
      // l'horodatage n'est pas encore confirmé, ce qui faisait disparaître
      // les cabinets les plus anciens. On trie donc nous-mêmes, côté client,
      // ce qui garantit que TOUS les cabinets restent toujours visibles.
      unsubscribeClients = db
        .collection('cabinets')
        .onSnapshot(function (snapshot) {
          clientListEl.innerHTML = '';

          if (snapshot.empty) {
            clientListEl.innerHTML = '<p class="empty-list">Aucun cabinet pour le moment.</p>';
            return;
          }

          const docs = snapshot.docs.slice().sort(function (a, b) {
            const ta = a.data().createdAt && a.data().createdAt.toMillis ? a.data().createdAt.toMillis() : 0;
            const tb = b.data().createdAt && b.data().createdAt.toMillis ? b.data().createdAt.toMillis() : 0;
            return tb - ta;
          });

          docs.forEach(function (doc) {
            const d = doc.data();
            const item = document.createElement('div');
            item.className = 'client-item' + (doc.id === currentClientId ? ' active' : '');
            item.innerHTML =
              '<strong>' + (d.nom || 'Sans nom') + '</strong>' +
              '<span>' + (d.telephone || '') + '</span>';
            item.addEventListener('click', function () {
              openClient(doc.id, d);
            });
            clientListEl.appendChild(item);
          });
        });
    }

    function openClient(id, data) {
      currentClientId = id;
      document.querySelectorAll('.client-item').forEach(function (el) {
        el.classList.remove('active');
      });

      noSelectionEl.style.display = 'none';
      chatActiveEl.style.display = 'flex';

      chatClientName.textContent = data.nom || 'Client';
      const metaParts = [];
      if (data.telephone) metaParts.push(data.telephone);
      if (data.email) metaParts.push(data.email);
      if (data.sujet) metaParts.push(sujetLabels[data.sujet] || data.sujet);
      chatClientMeta.textContent = metaParts.join(' · ');

      if (unsubscribeMessages) unsubscribeMessages();
      unsubscribeMessages = db
        .collection('cabinets')
        .doc(id)
        .collection('messages')
        .orderBy('timestamp', 'asc')
        .onSnapshot(function (snapshot) {
          chatMessagesEl.innerHTML = '';
          snapshot.forEach(function (doc) {
            const m = doc.data();
            const div = document.createElement('div');
            div.className = 'msg ' + (m.sender === 'admin' ? 'msg-admin' : 'msg-client');
            div.textContent = m.text;
            chatMessagesEl.appendChild(div);
          });
          chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
        });
    }

    replyForm.addEventListener('submit', function (e) {
      e.preventDefault();
      const text = replyInput.value.trim();

      if (!currentClientId) {
        alert('Aucun client sélectionné. Appuyez d’abord sur un nom dans la liste à gauche.');
        return;
      }
      if (!text) return;

      replyInput.value = '';

      db.collection('cabinets')
        .doc(currentClientId)
        .collection('messages')
        .add({
          sender: 'admin',
          text: text,
          timestamp: firebase.firestore.FieldValue.serverTimestamp()
        })
        .catch(function (err) {
          alert('Erreur lors de l’envoi : ' + err.message);
          replyInput.value = text;
        });
    });

    // --- Onglets Cabinets / Publications ---
    const tabCabinets = document.getElementById('tab-cabinets');
    const tabPublications = document.getElementById('tab-publications');
    const panelCabinets = document.getElementById('panel-cabinets');
    const panelPublications = document.getElementById('panel-publications');
    const sidebarTitle = document.getElementById('sidebar-title');

    let unsubscribePublications = null;

    tabCabinets.addEventListener('click', function () {
      tabCabinets.classList.add('active');
      tabPublications.classList.remove('active');
      panelCabinets.style.display = 'flex';
      panelPublications.style.display = 'none';
      clientListEl.style.display = 'block';
      sidebarTitle.textContent = 'Cabinets';
    });

    tabPublications.addEventListener('click', function () {
      tabPublications.classList.add('active');
      tabCabinets.classList.remove('active');
      panelPublications.style.display = 'block';
      panelCabinets.style.display = 'none';
      clientListEl.style.display = 'none';
      sidebarTitle.textContent = 'Publications';
      loadPublicationsAdmin();
    });

    // --- Formulaire de publication ---
    const pubForm = document.getElementById('pub-form');
    const pubStatus = document.getElementById('pub-status');
    const pubListEl = document.getElementById('pub-list');

    pubForm.addEventListener('submit', function (e) {
      e.preventDefault();

      const title = document.getElementById('pub-title').value.trim();
      const type = document.getElementById('pub-type').value;
      const content = document.getElementById('pub-content').value.trim();
      const url = document.getElementById('pub-url').value.trim();

      if (!title || !content) return;

      db.collection('publications')
        .add({
          title: title,
          type: type,
          content: content,
          url: url,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        })
        .then(function () {
          pubForm.reset();
          pubStatus.textContent = 'Publié avec succès.';
          pubStatus.style.display = 'block';
          setTimeout(function () { pubStatus.style.display = 'none'; }, 4000);
        })
        .catch(function (err) {
          alert('Erreur lors de la publication : ' + err.message);
        });
    });

    function loadPublicationsAdmin() {
      if (unsubscribePublications) return; // déjà en écoute
      unsubscribePublications = db
        .collection('publications')
        .onSnapshot(function (snapshot) {
          pubListEl.innerHTML = '';

          if (snapshot.empty) {
            pubListEl.innerHTML = '<p class="empty-list">Aucune publication pour le moment.</p>';
            return;
          }

          const docs = snapshot.docs.slice().sort(function (a, b) {
            const ta = a.data().createdAt && a.data().createdAt.toMillis ? a.data().createdAt.toMillis() : 0;
            const tb = b.data().createdAt && b.data().createdAt.toMillis ? b.data().createdAt.toMillis() : 0;
            return tb - ta;
          });

          docs.forEach(function (doc) {
            const d = doc.data();
            const item = document.createElement('div');
            item.className = 'pub-item';
            item.innerHTML =
              '<div><h4>' + d.title + '</h4><p>' + (d.type || 'article') + '</p></div>' +
              '<button type="button" aria-label="Supprimer"><i class="fa-solid fa-trash"></i></button>';
            item.querySelector('button').addEventListener('click', function () {
              if (confirm('Supprimer cette publication ?')) {
                db.collection('publications').doc(doc.id).delete();
              }
            });
            pubListEl.appendChild(item);
          });
        });
    }
  </script>
</body>
</html>
